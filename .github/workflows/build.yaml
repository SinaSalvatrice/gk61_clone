# QMK Firmware Build Workflow
name: QMK Firmware Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install QMK toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-avr avr-libc binutils-arm-none-eabi gcc-arm-none-eabi dfu-programmer dfu-util avrdude dos2unix git make diffutils

      - name: Install QMK CLI
        run: |
          python -m pip install --upgrade pip
          pip install qmk

      - name: QMK setup
        run: |
          qmk setup -y
          qmk doctor

      - name: Build firmware
        run: |
          qmk compile -kb GK61_clone -km default

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: qmk_firmware/.build/*.bin

